          exclude:
            docs: true
        inputs:
          packages:
            type: org.osbuild.files
            origin: org.osbuild.source
            mpp-depsolve:
              architecture: x86_64
              module-platform-id: 'platform:el9'
              repos:
                - id: baseos
                  baseurl: https://rpmrepo.osbuild.org/v2/mirror/rhvpn/el9/el9-x86_64-baseos-n9.4-20240822
                - id: appstream
                  baseurl: https://rpmrepo.osbuild.org/v2/mirror/rhvpn/el9/el9-x86_64-appstream-n9.4-20240822
              packages:
                - basesystem
                - container-selinux
                - coreutils
                - dracut-config-generic
                - glibc
                - kernel
                - policycoreutils
                - policycoreutils-python-utils
                - redhat-release
                - rpm
                - rpm-ostree
                - selinux-policy-targeted
                - setools-console
              excludes:
                - dracut-config-rescue
      # Copy the container archive from the input-tree pipeline into the
      # container storage
      - type: org.osbuild.skopeo
        inputs:
          images:
            type: org.osbuild.containers
            origin: org.osbuild.pipeline
            references:
              name:input-tree:
                name: localhost/container-with-devnull
        options:
          destination:
            type: containers-storage
            storage-path: /usr/share/containers/storage
      - type: org.osbuild.selinux
        options:
          file_contexts: etc/selinux/targeted/contexts/files/file_contexts
      - type: org.osbuild.ostree.preptree
        options:
          etc_group_members:
            - wheel
            - docker
  - name: ostree-commit
    build: name:build
    stages:
      - type: org.osbuild.ostree.init
        options:
          path: /repo
      - type: org.osbuild.ostree.commit
        inputs:
          tree:
            type: org.osbuild.tree
            origin: org.osbuild.pipeline
            references:
              - name:os
        options:
          ref: "rhel/9/x86_64/edge"
          os_version: "9.4"
  - name: commit-archive
    build: name:build
    stages:
      - type: org.osbuild.tar
        inputs:
          tree:
            type: org.osbuild.tree
            origin: org.osbuild.pipeline
            references:
              - name:ostree-commit
        options:
          filename: edge-commit.tar
