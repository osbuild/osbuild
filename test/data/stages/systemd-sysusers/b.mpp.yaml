version: '2'
sources:
  org.osbuild.inline:
    items:
      sha256:c21fc773e6257699f0a753914eeb818919662f90077f1145dd6e83cee9353cb6:
        encoding: base64
        data: dSBmbGF0cGFrIC0gIkZsYXRwYWsgc3lzdGVtIGhlbHBlciIgLQo=
pipelines:
  - mpp-import-pipelines:
      path: ../manifests/fedora-vars.ipp.yaml
  - mpp-import-pipeline:
      path: ../manifests/fedora-build-v2.ipp.yaml
      id: build
    runner:
      mpp-format-string: org.osbuild.fedora{release}
  - name: tree
    build: name:build
    stages:
      - type: org.osbuild.rpm
        inputs:
          packages:
            type: org.osbuild.files
            origin: org.osbuild.source
            mpp-depsolve:
              architecture: $arch
              module-platform-id: $module_platform_id
              repos:
                mpp-eval: repos
              packages:
                - nftables
                - openssh-server
                - systemd
        options:
          gpgkeys:
            mpp-eval: gpgkeys
          exclude:
            docs: true
      
      - type: org.osbuild.copy
        inputs:
          inlinefile:
            type: org.osbuild.files
            origin: org.osbuild.source
            references:
              sha256:c21fc773e6257699f0a753914eeb818919662f90077f1145dd6e83cee9353cb6: {}
        options:
          paths:
            - from: input://inlinefile/sha256:c21fc773e6257699f0a753914eeb818919662f90077f1145dd6e83cee9353cb6
              to: tree:///a-new.conf
      - type: org.osbuild.mkdir
        options:
          paths:
            - path: /etc/sysusers.d

      - type: org.osbuild.systemd-sysusers
        options: {}
      
      - type: org.osbuild.systemd-sysusers
        options:
          paths:
            - tree:///a-new.conf
          config:
            filename: new.conf
            entries:
              - type: u
                name: sysuser-a
                id: "-"
              - type: g
                name: sysuser-a-group
                id: "101"
              - type: m
                name: sysuser-a
                id: sysuser-a-group
          apply: true
